<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모각코 스터디 트래커</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3182F6',
            'primary-dark': '#1B64DA',
            'bg-light': '#F4F4F4',
            'bg-dark': '#1B1B1E',
            'card-light': '#FFFFFF',
            'card-dark': '#2C2C2E',
            'text-primary': '#191F28',
            'text-secondary': '#8B95A1',
            'text-dark-primary': '#F2F4F6',
            'text-dark-secondary': '#8B95A1',
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            'card': '16px',
            'btn': '12px',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark min-h-screen font-sans transition-colors">
  <div id="app" class="max-w-[480px] mx-auto min-h-screen flex flex-col pb-20">
    <!-- Header -->
    <header class="sticky top-0 z-30 bg-bg-light/80 dark:bg-bg-dark/80 backdrop-blur-md px-5 pt-4 pb-2">
      <h1 id="header-title" class="text-xl font-bold text-text-primary dark:text-text-dark-primary">주차장 스터디</h1>
      <p id="header-subtitle" class="text-sm text-text-secondary mt-0.5"></p>
    </header>

    <!-- Tab Content -->
    <main id="tab-content" class="flex-1 px-5 py-3"></main>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-card-light/90 dark:bg-card-dark/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-700 z-40">
      <div class="flex justify-around items-center h-16">
        <button class="tab-btn flex flex-col items-center gap-0.5 py-2 px-3" data-tab="today">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span class="text-xs">오늘</span>
        </button>
        <button class="tab-btn flex flex-col items-center gap-0.5 py-2 px-3" data-tab="calendar">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span class="text-xs">캘린더</span>
        </button>
        <button class="tab-btn flex flex-col items-center gap-0.5 py-2 px-3" data-tab="members">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          <span class="text-xs">멤버</span>
        </button>
        <button class="tab-btn flex flex-col items-center gap-0.5 py-2 px-3" data-tab="stats">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
          <span class="text-xs">통계</span>
        </button>
        <button class="tab-btn flex flex-col items-center gap-0.5 py-2 px-3" data-tab="settings">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span class="text-xs">설정</span>
        </button>
      </div>
    </nav>

    <!-- Bottom Sheet Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-50 hidden opacity-0 transition-opacity"></div>
    <div id="modal-sheet" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-card-light dark:bg-card-dark rounded-t-[20px] z-50 hidden translate-y-full transition-transform">
      <div class="flex justify-center pt-3 pb-1"><div class="w-10 h-1 bg-gray-300 dark:bg-gray-600 rounded-full"></div></div>
      <div id="modal-content" class="px-6 pb-8 max-h-[70vh] overflow-y-auto"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
